name: Update Sunday Readings

on:
  workflow_dispatch:

  schedule:
    # Runs every 6 hours
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: |
          python main/scraper.py

      - name: Display generated JSON
        run: |
          echo "===== readings.json ====="
          cat main/readings.json

      - name: Upload debug HTML
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: main/debug.html

      - name: Check repository files
        run: |
          ls -R

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add main/readings.json
          git add main/readings_ml.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto update Sunday readings"
            git push
          fi    
